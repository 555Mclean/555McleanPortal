name: Weekly Health Check

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday ~9am ET (14:00 UTC)
  workflow_dispatch:

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  stale-content:
    name: Check for Stale Meeting Dates
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Check meeting dates
        id: check
        run: node scripts/check-stale.mjs
        continue-on-error: true
      - name: Open issue if meetings are stale
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'stale-content';

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'e4e669',
                description: 'Site content needs updating',
              });
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Meeting schedule needs updating',
                body: [
                  'The weekly health check found no upcoming meetings with confirmed dates in `data/meetings.json`.',
                  '',
                  '**Action needed:** Update `data/meetings.json` with the next scheduled meeting date and push to `main`.',
                ].join('\n'),
                labels: [label],
              });
            }

  placeholder-content:
    name: Check for Placeholder Contact Info
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Check for placeholders
        id: check
        run: node scripts/check-placeholders.mjs
        continue-on-error: true
      - name: Open issue if placeholders found
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'needs-update';

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'f9d0c4',
                description: 'Contact info or content needs updating',
              });
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Placeholder contact info still in the portal',
                body: [
                  'The weekly health check found placeholder values still in `index.html`.',
                  '',
                  '**Items to replace:**',
                  '- `board@example.com` → real board email address',
                  '- `info@example.com` → managing agent email address',
                  '- `(914) 555-0000` → real building emergency number',
                  '- Managing agent name (currently "Name & contact to be confirmed")',
                  '',
                  '**Action needed:** Update `index.html` with the real contact details and push to `main`.',
                  'This issue will close automatically once the placeholders are removed.',
                ].join('\n'),
                labels: [label],
              });
            }
